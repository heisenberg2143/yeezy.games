<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yeezy Games</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#151515;
position:sticky;
top:0;
}

.logo{
font-size:24px;
font-weight:bold;
color:#4CAF50;
}

.search{
padding:8px 12px;
border-radius:8px;
border:none;
width:220px;
}

/* CONTAINER */

.container{
padding:30px;
}

/* SECTION TITLE */

.section-title{
font-size:22px;
margin-bottom:15px;
}

/* GAME GRID */

.games{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

/* GAME CARD */

.game{
background:#1b1b1b;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.game:hover{
transform:scale(1.05);
background:#242424;
}

.game img{
width:100%;
height:110px;
object-fit:cover;
}

.game-title{
padding:10px;
font-size:14px;
}

/* TRENDING */

.trending{
margin-bottom:40px;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#151515;
margin-top:40px;
color:#aaa;
}

/* MOBILE */

@media(max-width:600px){

.search{
width:140px;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">🎮 Yeezy Games</div>

<input class="search" id="search" placeholder="Oyun ara...">

</nav>

<div class="container">

<div class="trending">

<div class="section-title">🔥 Trending</div>

<div class="games">

<div class="game">
<img src="https://via.placeholder.com/300x200">
<div class="game-title">Yakında</div>
</div>

<div class="game">
<img src="https://via.placeholder.com/300x200">
<div class="game-title">Yakında</div>
</div>

<div class="game">
<img src="https://via.placeholder.com/300x200">
<div class="game-title">Yakında</div>
</div>

</div>

</div>

<div class="section-title">🎮 Tüm Oyunlar</div>

<div class="games" id="games">

<div class="game">
<img src="https://via.placeholder.com/300x200">
<div class="game-title">Yakında</div>
</div>

<div class="game">

<div class="game-title">Yakında</div>
</div>

<div class="game">
<img src="https://via.placeholder.com/300x200">
<div class="game-title">Yakında</div>
</div>

<div class="game">

<div class="game-title">Yakında</div>
</div>

<div class="game">
<img src="https://via.placeholder.com/300x200">
<div class="game-title">Yakında</div>
</div>

<div class="game">
<img src="https://via.placeholder.com/300x200">
<div class="game-title">Yakında</div>
</div>

</div>

</div>

<footer>
Yeezy Games © 2026
</footer>

<script>

const search = document.getElementById("search")
const games = document.querySelectorAll(".game")

search.addEventListener("keyup", function(){

let value = search.value.toLowerCase()

games.forEach(game => {

let title = game.innerText.toLowerCase()

if(title.includes(value))
{
game.style.display="block"
}
else
{
game.style.display="none"
}

})

})

</script>

</body>
</html>
